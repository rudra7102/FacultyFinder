<!DOCTYPE html>

<html>

<head>

    <title>Faculty Finder</title>

    <link
        rel="stylesheet"
        href="style.css"
    />

</head>

<body>

    <section class="hero">

        <h1>Faculty Finder</h1>

        <p>
            AI Powered Semantic Faculty Search Engine
        </p>

        <div class="search-box">

            <input
                type="text"
                id="query"
                placeholder="Search research interests like Machine Learning, Cyber Security..."
            />

            <button onclick="searchFaculty()">
                Search
            </button>

        </div>

    </section>

    <div id="results"></div>

    <script src="script.js"></script>

</body>

</html>
